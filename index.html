<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Private</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .alert-box {
            background-color: #fff;
            border: 2px solid #f44336;
            padding: 30px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
        }
        h1 {
            color: #f44336;
            margin-bottom: 10px;
        }
        p {
            color: #333;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="alert-box">
        <h1>Notice</h1>
        <p>Sorry, everyone! Our website is currently private due to security updates. We’ll be back soon with a better version. Thank you for your patience!</p>
        <p>- vhdix and Team</p>
    </div>
</body>
</html>
