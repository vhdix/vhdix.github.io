<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chavvi Page</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        button {
            padding: 12px 25px;
            margin: 10px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #22c55e;
            color: white;
        }

        /* Overlay style */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            color: white;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <h1>Hello, how are you Chavvi? 😊</h1>

    <button onclick="showOverlay()">Main theek hun</button>
    <button onclick="showOverlay()">Main theek nahin hun</button>

    <!-- Overlay -->
    <div id="overlay">Main kya karun 😅</div>

    <script>
        function showOverlay() {
            document.getElementById("overlay").style.display = "flex";
        }
    </script>

</body>
</html>
