<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>How Are You</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding-top: 100px;
        }
        button {
            padding: 12px 25px;
            margin: 10px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #22c55e;
            color: white;
        }
        img {
            margin-top: 20px;
            width: 300px;
            display: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>How are you?</h1>

    <button onclick="showImage('good')">Theek hun 😊</button>
    <button onclick="showImage('bad')">Theek nahin hun 😔</button>

    <br>

    <!-- Images -->
    <img id="goodImg" src="https://i.imgur.com/2DhmtJ4.png">
    <img id="badImg" src="https://i.imgur.com/Q9qFt3m.png">

    <script>
        function showImage(type) {
            document.getElementById("goodImg").style.display = "none";
            document.getElementById("badImg").style.display = "none";

            if(type === "good") {
                document.getElementById("goodImg").style.display = "block";
            } else {
                document.getElementById("badImg").style.display = "block";
            }
        }
    </script>

</body>
</html>
