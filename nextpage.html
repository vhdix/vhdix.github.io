ab<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chavvi Survey</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding-top: 80px;
        }

        h1 {
            font-size: 30px;
        }

        button {
            padding: 12px 25px;
            margin: 10px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #22c55e;
            color: white;
        }

        #result {
            font-size: 40px;
            margin-top: 30px;
            display: none;
        }

        img {
            width: 250px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <h1>How are you Chavvi? 💚<br>Tum kaisi ho?</h1>

    <button onclick="showResult()">Main theek hun 😊</button>
    <button onclick="showResult()">Main theek nahin hun 😔</button>

    <div id="result">To bhai Main kya karun 😅</div>

    <!-- Sticker image -->
    <img id="sticker" src="sticker.png" alt="sticker">

    <script>
        function showResult() {
            document.getElementById("result").style.display = "block";
            document.getElementById("sticker").style.display = "block";
        }
    </script>

</body>
</html>
